<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <section id="tela-login">
        <h1>Bemm Vindo à Nuvem Literária</h1>
        <h2>Faça seu login</h2>
        <h3>Se não tem uma conta, <a href="cadastro.html">cadastre-se</a></h3>
        <div class="container-login">

            <div class="campo-grupo">
                <input type="text" id="nome-completo" placeholder="Digite seu nome completo(admin)">
            </div>

            <div class="campo-grupo">
                <input type="email" id="email-login" placeholder="Digite seu e-mail(admin@email.com)">
            </div>

            <div class="campo-grupo">
                <input type="text" id="cpf-login" placeholder="Digite seu CPF(12345678900)">
            </div>

            <input type="password" id="senha-admin" placeholder="Senha (admin: biblioteca123, leitor: 123456)">

        </div>

        <button class="btn-entrar" onclick="realizarLogin()">
            Entrar
        </button>
        
    </section>


    <script src="script.js"></script>
</body>

</html>
