<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>
    <section id="tela-cadastro">
        <h1>Bemm Vindo à Nuvem Literária</h1>
        <h2>Faça seu cadastro</h2>
        <div class="container-login">

            <div class="campo-grupo">
                <input type="text" id="nome-completo" placeholder="Digite seu nome completo(admin)">
            </div>

            <div class="campo-grupo">
                <input type="email" id="email-login" placeholder="Digite seu e-mail(admin@email.com)">
            </div>

            <div class="campo-grupo">
                <input type="text" id="cpf-login" placeholder="Digite seu CPF(12345678900)">
            </div>

             <div class="campo-grupo">
                <input type="password" id="senha-login" placeholder="Digite sua senha(admin)">
            </div>
        

            <button class="btn-entrar" onclick="realizarCadastro()">Cadastrar</button>
        
    </section>


    <script src="../script.js"></script>
</body>
</html>
